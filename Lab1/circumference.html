<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circumference of a Circle</title>
</head>
<body>
    <script>
        var radius = 7;
        var pi = 3.14159;
        var circumference = 2 * pi * radius;

        document.write("Radius: " + radius + "<br>");
        document.write("Circumference: " + circumference);
    </script>
</body>
</html>
