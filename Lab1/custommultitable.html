<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplication Table - Any Number</title>
</head>
<body>
    <script>
        var number = parseInt(prompt("Enter a number to see its multiplication table:"));

        for (var i = 1; i <= 10; i++) {
            document.write(number + " x " + i + " = " + (number * i) + "<br>");
        }
    </script>
</body>
</html>
