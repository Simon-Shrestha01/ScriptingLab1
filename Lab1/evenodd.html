<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Even or Odd</title>
</head>
<body>
    <script>
        var number = 14;

        if (number % 2 === 0) {
            document.write(number + " is Even");
        } else {
            document.write(number + " is Odd");
        }
    </script>
</body>
</html>
