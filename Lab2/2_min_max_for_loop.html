<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smallest and Largest - For Loop</title>
</head>
<body>
    <script>
        var a = [2, 19, 37, 48, 45, 94, 12, 23, 78];
        var smallest = a[0];
        var largest = a[0];

        for (var i = 1; i < a.length; i++) {
            if (a[i] < smallest) {
                smallest = a[i];
            }
            if (a[i] > largest) {
                largest = a[i];
            }
        }

        document.write("Smallest number: " + smallest + "<br>");
        document.write("Largest number: " + largest);
    </script>
</body>
</html>
